---
- name: Clone repository
  git:
    repo: "https://github.com/AbdullahHAK/DevOps-Node-js-CI_CD-pipeline.git"
    dest: /home/ubuntu/devops-app
    version: main
    force: yes

- name: Install dependencies
  npm:
    path: /home/ubuntu/devops-app/app

- name: Start application with PM2
  shell: |
    pm2 delete devops-app || true
    pm2 start server.js --name devops-app
  args:
    chdir: /home/ubuntu/devops-app/app