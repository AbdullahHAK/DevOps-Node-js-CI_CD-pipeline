---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Deploy nginx configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/devops-app
  notify: restart nginx

- name: Enable site
  file:
    src: /etc/nginx/sites-available/devops-app
    dest: /etc/nginx/sites-enabled/devops-app
    state: link

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Ensure nginx is running
  service:
    name: nginx
    state: started
    enabled: yes